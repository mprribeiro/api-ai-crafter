spring:
  application:
    name: app-ai-crafter
  security:
    user:
      name: user
      password: ${SPRING_SECURITY_PASSWORD}
  datasource:
    url: jdbc:postgresql://localhost:5432/crafter-db
    username: admin
    password: ${DATABASE_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  ai:
    openai:
      api-key: ${OPEN_ROUTER_API_KEY}
      base-url: https://openrouter.ai/api/v1
      chat:
        options:
          model: google/gemini-3-flash-preview
          temperature: 0.0

jwt:
  secret: ${JWT_SECRET}

stripe:
  api:
    secret: ${STRIPE_API_SECRET}
  webhook:
    secret: ${STRIPE_WEBHOOK_SECRET}

client:
  url: http://localhost:8080

management:
  endpoints:
    web.exposure.include: health,info,metrics,prometheus
  endpoint:
    health.show-details: always
    prometheus:
      enabled: true
  metrics:
    distribution:
      percentiles-histogram:
        all: true
      sla:
        '[http.server.requests]': 50ms, 100ms, 250ms, 500ms, 1s, 2s, 5s, 10s
    export:
      prometheus:
        enabled: true
  tracing:
    sampling:
      probability: 1.0